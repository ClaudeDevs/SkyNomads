# Production stack for SkyNomads' backend: Postgres + Nakama + Caddy (TLS).
# Run on an always-on host (e.g. Oracle Cloud Always-Free VM).
#
#   1. Build the modules first:  cd ../server && npm install && npm run build
#   2. Set DOMAIN + DB_PASSWORD in a .env file next to this file.
#   3. docker compose -f docker-compose.prod.yml up -d
#
# Caddy gets a free Let's Encrypt cert for $DOMAIN and proxies wss/https to Nakama.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  nakama:
    image: heroiclabs/nakama:3.24.0   # multi-arch (works on Oracle ARM)
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address postgres:${DB_PASSWORD}@postgres:5432/nakama &&
        exec /nakama/nakama
        --database.address postgres:${DB_PASSWORD}@postgres:5432/nakama
        --name nakama1
        --logger.level INFO
        --runtime.js_entrypoint "index.js"
    volumes:
      - ../server/build:/nakama/data/modules   # the bundled index.js
    expose:
      - "7350"
      - "7351"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on: [nakama]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  data:
  caddy_data:
  caddy_config:
