name: Web Export

# Exports the Godot client to HTML5 and publishes it to GitHub Pages so the
# game can be played in a browser with no local install.
#
# One-time setup in the repo: Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions".

on:
  push:
    branches: [main, claude/happy-gates-ibl0gt]
    paths:
      - "client/**"
      - ".github/workflows/web-export.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    # Pinned Godot version — keep in sync with client/project.godot config/features.
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/* ~/.local/share/godot/export_templates/

      - name: Export Web build
        run: |
          cd client
          mkdir -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html
          # Pages won't serve a directory index without index.html at the root,
          # which Godot already names index.html — good.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/build/web

  deploy:
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
